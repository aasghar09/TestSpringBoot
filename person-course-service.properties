spring.application.name=person-course-service


spring.datasource.url=jdbc:mysql://mysql:3306/schooldb
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Root logging level
logging.level.root=INFO

# Package-specific logging (set DEBUG for your app package)
logging.level.com.example.personcourseservice=DEBUG

# Log file output (optional)
logging.file.name=logs/app.log
logging.file.path=./logs

# Sleuth settings
spring.sleuth.enabled=true
spring.sleuth.sampler.probability=1.0

# Zipkin settings
spring.zipkin.base-url=http://zipkin:9411
spring.zipkin.sender.type=web

# Enable actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
# Customize health check
management.endpoint.health.show-details=always


server.port=8080
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/school-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/school-realm/protocol/openid-connect/certs

