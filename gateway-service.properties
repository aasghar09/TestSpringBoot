spring.application.name=gateway-service
server.port=8081
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/

#spring.cloud.gateway.default-filters[0]=TokenRelay

spring.cloud.gateway.routes[0].id=person-course-service
spring.cloud.gateway.routes[0].uri=lb://person-course-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/persons/**
#spring.cloud.gateway.routes[0].filters=StripPrefix=1

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/school-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/school-realm/protocol/openid-connect/certs
